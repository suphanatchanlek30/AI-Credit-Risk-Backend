services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-credit-risk-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5435}:5432"
    volumes:
      - ${POSTGRES_VOLUME_NAME:-pgdata}:/var/lib/postgresql/data
      - ${POSTGRES_INIT_DIR:-./docker/postgres/init}:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:8}
    container_name: ${PGADMIN_CONTAINER_NAME:-credit-risk-pgadmin}
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_HOST_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER_NAME:-credit-risk-api}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: ${POSTGRES_VOLUME_NAME:-pgdata}
