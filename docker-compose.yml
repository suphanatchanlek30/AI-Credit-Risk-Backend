services:
  postgres:
    image: postgres:16-alpine
    container_name: credit-risk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: credit_risk
      POSTGRES_USER: credit_user
      POSTGRES_PASSWORD: credit_pass
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_user -d credit_risk"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: credit-risk-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit-risk-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://credit_user:credit_pass@postgres:5432/credit_risk
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
